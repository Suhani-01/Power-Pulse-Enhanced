<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PowerPulse Enhanced</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* --- Global Reset & Variables --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-dark: #0b0f19;
            --card-bg: #161b2a;
            --accent-blue: #00d2ff;
            --text-bright: #ffffff;
            --text-dim: #94a3b8;
            --gradient: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            --error-red: #ff4b2b;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-bright);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a { text-decoration: none; transition: 0.3s ease; }

        /* --- Reusable Window --- */
        .window {
            max-width: 1200px;
            width: 90%;
            margin: 0 auto;
        }

        /* --- Header --- */
        header {
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 1000;
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.2rem 0;
        }

        header .window {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h2 {
            font-size: 1.4rem;
            color: var(--accent-blue);
            font-weight: 700;
        }

        nav a{
            color: var(--text-dim);
            font-size: 1.2rem;
        }

        nav a:hover { color: var(--accent-blue); }

        /* --- Main Content (Login Box) --- */
        main {
            flex: 1;
            padding-top: 150px;
            padding-bottom: 60px;
            background: radial-gradient(circle at top, rgba(0, 210, 255, 0.05) 0%, transparent 50%);
        }

        .login-container {
            background: var(--card-bg);
            max-width: 500px;
            width: 90%;
            margin: 0 auto;
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .login-heading {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-heading h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-heading p {
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        /* --- Form Elements --- */
        .form-to-submit {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-info {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .input-info label {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-left: 5px;
        }

        .input-field {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            transition: 0.3s;
        }

        .input-info input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }

        .input-info input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.1);
        }

        /* Highlight icon on focus */
        .input-field:focus-within .input-icon {
            color: var(--accent-blue);
        }

        /* --- Submit Button --- */
        .button-1 {
            margin-top: 1rem;
            background: var(--gradient);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
        }

        .button-1:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 210, 255, 0.3);
        }

        .error-message {
            color: var(--error-red);
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* --- Footer --- */
        footer {
            background: #05070a;
            padding: 3rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: auto;
        }

        .foot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .foot h2 { color: var(--accent-blue); font-size: 1.2rem; }
        .foot p { color: var(--text-dim); font-size: 0.85rem; }

        .icons { display: flex; gap: 1.2rem; }
        .icons a { color: var(--text-dim); font-size: 1.2rem; }
        .icons a:hover { color: var(--accent-blue); }

        /* --- Responsiveness --- */

        /* Tablet (Max 768px) */
        @media (max-width: 768px) {
            header .window { flex-direction: row; }
            main { padding-top: 120px; }
            .login-container { padding: 30px 20px; }
            .foot { flex-direction: column; text-align: center; }
        }

        /* Mobile (Max 480px) */
        @media (max-width: 480px) {
            .login-heading h2 { font-size: 1.6rem; }
            .login-container { width: 95%; }
        }
    </style>
</head>

<body>
    <header>
        <div class="window">
            <h2><i class="fa-solid fa-bolt"></i> PowerPulse</h2>
            <nav>
                
                    <a href="/"><i class="fas fa-arrow-left"></i> Back</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="login-container">
            <div class="login-heading">
                <h2>Login to Continue</h2>
                <p>Enter credentials to access the AI prediction system</p>
            </div>

            <form class="form-to-submit" method="POST" action="{{ url_for('login') }}">
                <div class="input-info">
                    <label for="username">Username</label>
                    <div class="input-field">
                        <i class="fa-solid fa-user input-icon"></i>
                        <input type="text" placeholder="Enter username" id="username" name="username" required />
                    </div>
                </div>

                <div class="input-info">
                    <label for="password">Password</label>
                    <div class="input-field">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" placeholder="Enter password" id="password" name="password" required />
                    </div>
                </div>

                <button class="button-1" type="submit">Proceed</button>
            </form>
 
                {% if message %}
                   
                            <p class="error-message">
                                <i class="fa-solid fa-circle-exclamation"></i> {{ message }}
                            </p>
                    
                {% endif %}
      
        </div>
    </main>

    <footer>
        <div class="window foot">
            <div>
                <h2><i class="fa-solid fa-bolt"></i> PowerPulse</h2>
                <p>AI-powered forecasting for Delhi energy demand..</p>
            </div>

            <div class="end-section">
                <p>© 2026 PowerPulse Enhanced. All rights reserved.</p>
                <div class="icons">
                    <a href="#"><i class="fa-brands fa-github"></i></a>
                    <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                    <a href="#"><i class="fa-solid fa-envelope"></i></a>
                </div>
            </div>
        </div>
    </footer>
</body>

</html>
